version: "3.8"
services:
  navidrome:
    image: deluan/navidrome:latest
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_BASEURL: ""
    volumes:
      - navidrome_data:/data
      - navidrome_music:/music:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=4533"
    networks:
      - selfhostbox
    restart: unless-stopped

volumes:
  navidrome_data:
  navidrome_music:

networks:
  selfhostbox:
    external: true
