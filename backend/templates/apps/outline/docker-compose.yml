version: "3.8"
services:
  outline:
    image: outlinewiki/outline:latest
    environment:
      NODE_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      UTILS_SECRET: ${UTILS_SECRET}
      DATABASE_URL: postgres://outline:${DB_PASSWORD}@outline-db:5432/outline
      DATABASE_URL_TEST: postgres://outline:${DB_PASSWORD}@outline-db:5432/outline-test
      REDIS_URL: redis://outline-redis:6379
      URL: https://${DOMAIN}
      PORT: 3000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_UPLOAD_BUCKET_URL: ${AWS_S3_UPLOAD_BUCKET_URL}
      AWS_S3_UPLOAD_BUCKET_NAME: ${AWS_S3_UPLOAD_BUCKET_NAME}
      AWS_S3_UPLOAD_MAX_SIZE: 26214400
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_AUTH_URI: ${OIDC_AUTH_URI}
      OIDC_TOKEN_URI: ${OIDC_TOKEN_URI}
      OIDC_USERINFO_URI: ${OIDC_USERINFO_URI}
    volumes:
      - outline_data:/var/lib/outline/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=3000"
    networks:
      - selfhostbox
      - outline-internal
    restart: unless-stopped
    depends_on:
      - outline-db
      - outline-redis

  outline-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: outline
    volumes:
      - outline_db:/var/lib/postgresql/data
    networks:
      - outline-internal
    restart: unless-stopped

  outline-redis:
    image: redis:7-alpine
    volumes:
      - outline_redis:/data
    networks:
      - outline-internal
    restart: unless-stopped

volumes:
  outline_data:
  outline_db:
  outline_redis:

networks:
  selfhostbox:
    external: true
  outline-internal:
