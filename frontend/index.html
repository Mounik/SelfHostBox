<!DOCTYPE html>
<html>
<head>
    <title>SelfHostBox</title>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #0d1117; color: #c9d1d9; }
        .header { background: #161b22; padding: 1rem 2rem; border-bottom: 1px solid #30363d; }
        .header h1 { color: #58a6ff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #161b22; border: 1px solid #30363d; padding: 1.5rem; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: #3fb950; }
        .stat-label { color: #8b949e; font-size: 0.85rem; }
        .section { margin-bottom: 2rem; }
        .section-title { font-size: 1.5rem; margin-bottom: 1rem; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
        .app-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; cursor: pointer; transition: border-color 0.2s; }
        .app-card:hover { border-color: #58a6ff; }
        .app-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .app-desc { color: #8b949e; font-size: 0.9rem; }
        .btn { display: inline-block; padding: 0.5rem 1rem; background: #238636; color: white; text-decoration: none; border-radius: 6px; border: none; cursor: pointer; }
        .btn:hover { background: #2ea043; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏠 SelfHostBox</h1>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="app-count">0</div>
                <div class="stat-label">Apps Deployed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="cpu-usage">0%</div>
                <div class="stat-label">CPU Usage</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="mem-usage">0%</div>
                <div class="stat-label">Memory</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="disk-usage">0%</div>
                <div class="stat-label">Disk</div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">App Store</h2>
            <div class="app-grid" id="app-store"></div>
        </div>

        <div class="section">
            <h2 class="section-title">Deployed Apps</h2>
            <div class="app-grid" id="deployed-apps"></div>
        </div>
    </div>

    <script>
        async function loadSystem() {
            const res = await fetch('/api/system/info');
            const data = await res.json();
            document.getElementById('cpu-usage').textContent = data.cpu_percent + '%';
            document.getElementById('mem-usage').textContent = data.memory.percent + '%';
            document.getElementById('disk-usage').textContent = data.disk.percent + '%';
        }

        async function loadStore() {
            const res = await fetch('/api/store');
            const apps = await res.json();
            const grid = document.getElementById('app-store');
            grid.innerHTML = apps.map(app => `
                <div class="app-card" onclick="deployApp('${app.id}')">
                    <div class="app-name">${app.name}</div>
                    <div class="app-desc">${app.description || ''}</div>
                </div>
            `).join('');
        }

        async function loadDeployed() {
            const res = await fetch('/api/apps');
            const apps = await res.json();
            document.getElementById('app-count').textContent = apps.length;
            const grid = document.getElementById('deployed-apps');
            grid.innerHTML = apps.map(app => `
                <div class="app-card">
                    <div class="app-name">${app.name}</div>
                    <div class="app-desc">${app.type} — ${app.status} — ${app.domain}</div>
                    <div style="margin-top:1rem;">
                        <button class="btn" onclick="startApp(${app.id})">Start</button>
                        <button class="btn" onclick="stopApp(${app.id})">Stop</button>
                        <button class="btn" onclick="deleteApp(${app.id})" style="background:#da3633;">Delete</button>
                    </div>
                </div>
            `).join('') || '<p style="color:#8b949e;">No apps deployed yet.</p>';
        }

        async function deployApp(appType) {
            const name = prompt('App name:', appType + '-' + Math.random().toString(36).substr(2, 4));
            if (!name) return;
            
            await fetch('/api/apps', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({app_type: appType, name: name})
            });
            loadDeployed();
        }

        async function startApp(id) {
            await fetch(`/api/apps/${id}/start`, {method: 'POST'});
            loadDeployed();
        }

        async function stopApp(id) {
            await fetch(`/api/apps/${id}/stop`, {method: 'POST'});
            loadDeployed();
        }

        async function deleteApp(id) {
            if (!confirm('Delete this app?')) return;
            await fetch(`/api/apps/${id}`, {method: 'DELETE'});
            loadDeployed();
        }

        loadSystem();
        loadStore();
        loadDeployed();
        setInterval(loadSystem, 5000);
    </script>
</body>
</html>
